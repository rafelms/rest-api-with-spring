server:
  port: 8888
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://rafaelms.com.br
security:
  jwt:
    token:
      secret-key: 53cr37
      expire-lenght: 3600000 #1 hora
email:
  subject: "Default subject"
  message: "Default message"
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
    open-in-view: false
mail:
  host: smtp.gmail.com
  port: 587
  username: ${EMAIL_USERNAME}
  password: ${EMAIL_PASSWORD}
  properties:
    mail.smtp.auth: true
    mail.smtp.starttls.enabled: true
    mail.smtp.starttls.required: true

  flyway:
    baseline-on-migrate: true

logging:
  level:
    root: warn
    br.com.rafelms: debug

springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true