server:
  port: 8888
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://rafaelms.com.br
spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
    open-in-view: false

  flyway:
    baseline-on-migrate: true

logging:
  level:
    root: warn
    br.com.rafelms: debug

springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true