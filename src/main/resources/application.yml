security:
  jwt:
    token:
      secret-key: 53cr37
      expire-length: 3600000 #1 hora
email:
  subject: "Default subject"
  message: "Default message"
spring:
  application:
    name:
      rest-with-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rest-with-spring?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
    username: root
    password: novasenha
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
        show_sql: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
