          auth: true
          starttls:
            enable: true
            required: true
  flyway:
    baseline-on-migrate: true
logging:
  level:
    root: info
spring.doc:
  paths-to-match:
    - /api/**/v1/**
    - /auth/**
  swagger-ui:
    use-root-path: true