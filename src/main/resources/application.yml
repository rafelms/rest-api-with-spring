spring:
  application:
    name:
      rest-with-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rest-with-spring?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
        show_sql: false

    open-in-view: false
  flyway:
    baseline-on-migrate: true
logging:
  level:
    root: warn
    br.com.rafelms: DEBUG
spring.doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true